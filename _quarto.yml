project:
  type: book
  output-dir: docs

book:
  title: "Computational Analysis of Educational Data: A Field Guide Using R"
  author: "Wei Wang, Mete Akcaoglu, Joshua Rosenberg, Shaun Kellogg"
  date: last-modified
  date-format: "MMMM D, YYYY"
  
  chapters:
    - index.qmd

    - part: section-1-Intro.qmd
      chapters:
        - chapter-1.qmd
        - chapter-2.qmd
        - chapter-3.qmd

    - part: section-2-Intro.qmd
      chapters:
        - chapter-4.qmd
        - chapter-5.qmd
        - chapter-6.qmd

    - part: section-3-Intro.qmd
      chapters:
        - chapter-7.qmd
        - chapter-8.qmd
        - chapter-9.qmd
        - chapter-10.qmd

    - part: section-4-Intro.qmd
      chapters:
        - chapter-11.qmd
        - chapter-12.qmd

    - colophon.qmd
    - references.qmd


bibliography: references.bib
csl: apa.csl

format:
  html:
    theme:
      light: [flatly, styles/theme.scss]
      dark: [flatly, styles/dark-theme.scss]
    css: 
      - styles/override.css
      - styles/sidebar.css     
    number-sections: false     
    grid:
      sidebar-width: 300px
      body-width: 860px
      margin-width: 300px
      gutter-width: 1.5rem
    toc-title: "Contents"
    toc-depth: 3
    smooth-scroll: true


  pdf:
    documentclass: scrbook           # Book class supports recto chapter starts and front/main matter
    classoption:
      - openright                    # Start chapters on odd-numbered/right-hand pages
      - twoside                      # Use facing-page layout for print production
    pdf-engine: xelatex              # Use XeLaTeX for Unicode and font flexibility
    number-sections: false           # Disable section numbering
    toc-depth: 2                     # Table of contents depth
    papersize: custom
    geometry:
      - paperwidth=168mm             # Trim width plus 6mm crop area on each side
      - paperheight=246mm            # Trim height plus 6mm crop area on each side
      - layoutwidth=156mm            # CRC trim width
      - layoutheight=234mm           # CRC trim height
      - layouthoffset=6mm
      - layoutvoffset=6mm
      - inner=18mm
      - outer=14mm
      - top=18mm
      - bottom=20mm
      - showcrop                     # Draw crop marks at the trim box
    code-block:
      wrap: "auto"                   # Enable automatic line wrapping in code blocks
    code-block-bg: "#f9f9f9"         # Light gray background for code blocks
    code-block-border-left: "#cccccc" # Subtle left border for code blocks

    include-in-header:
      - styles/pdf-preamble.tex

editor: visual

execute:
  warning: false
  freeze: auto
  message: false

knitr:
  opts_chunk:
    warning: false
    message: false


  
  
  
  
